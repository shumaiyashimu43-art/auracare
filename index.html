<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCare - দাদুর সঙ্গী</title>
    <style>
        /* CSS স্টাইল */
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        #chat-box { height: 400px; background: white; padding: 15px; border-radius: 10px; overflow-y: scroll; margin-bottom: 10px; border: 1px solid #ddd; }
        .input-area { display: flex; gap: 5px; }
        #user-input { flex-grow: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        #send-btn { padding: 10px 20px; border-radius: 10px; border: none; background-color: #4a90e2; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>স্বাগতম, দাদু! 🌟</h2>
    
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="কিছু বলুন...">
        <button id="send-btn" onclick="sendMessage()">পাঠান</button>
    </div>
</div>

<script>
    // তোমার এপিআই কি-টি এখানে বসাও
    const GEMINI_API_KEY = "AQ.Ab8RN6JMk_97T1qh3BjEBHIKd8nzpN3K1Kxr3Xj5P1ggu6JE4Q"; 

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const text = input.value;
        if (!text) return;

        chatBox.innerHTML += `<p><b>দাদু:</b> ${text}</p>`;
        input.value = '';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `তুমি একজন যত্নশীল সঙ্গী। দাদুর ইনপুট: ${text}` }] }]
                })
            });
            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const reply = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<p><b>AuraCare:</b> ${reply}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                throw new Error("Response error");
            }
        } catch (error) {
            chatBox.innerHTML += `<p style="color:red;">দুঃখিত, সংযোগে সমস্যা হয়েছে। আবার চেষ্টা করো!</p>`;
        }
    }
</script>

</body>
</html>
