<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraCare - দাদুর সঙ্গী</title>
    <style>
        /* CSS স্টাইল */
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; }
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 15px; border: none; border-radius: 15px; background-color: #4a90e2; color: white; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #357abd; }
        #chat-box { height: 300px; background: white; padding: 15px; border-radius: 10px; overflow-y: scroll; margin-bottom: 10px; border: 1px solid #ddd; }
        #user-input { width: 70%; padding: 10px; }
        #send-btn { padding: 10px 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>স্বাগতম, দাদু! 🌟</h2>
    
    <!-- কুইক অ্যাকশন বাটনগুলো -->
    <div class="quick-actions">
        <button class="btn" onclick="sendQuickMessage('দাদু, আমাকে একটি সুন্দর ও মিষ্টি গল্প শোনাও।')">📖 গল্প শুনতে চাই</button>
        <button class="btn" onclick="sendQuickMessage('দাদু এখন একটু বিষণ্ণ বোধ করছে, তাকে সান্ত্বনা দাও এবং কিছু মিষ্টি কথা বলো।')">💙 মনটা ভালো নেই</button>
        <button class="btn" onclick="sendQuickMessage('আমাকে একটি খুব মজার এবং পরিষ্কার জোকস বা কৌতুক শোনাও।')">😂 হাসির কিছু বলো</button>
        <button class="btn" onclick="sendQuickMessage('আমি ঔষধ খেয়েছি দাদু।')">💊 ঔষধ খেয়েছি</button>
    </div>

    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="কিছু বলুন...">
    <button id="send-btn" onclick="sendMessage()">পাঠান</button>
</div>

<script>
    const GEMINI_API_KEY = "তোমার_নতুন_কোডটি"; // এখানে তোমার কি-টি বসাও

    async function sendQuickMessage(message) {
        document.getElementById('user-input').value = message;
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const text = input.value;
        if (!text) return;

        chatBox.innerHTML += `<p><b>দাদু:</b> ${text}</p>`;
        input.value = '';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `তুমি একজন যত্নশীল সঙ্গী। দাদুর ইনপুট: ${text}` }] }]
                })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            chatBox.innerHTML += `<p><b>AuraCare:</b> ${reply}</p>`;
        } catch (error) {
            chatBox.innerHTML += `<p style="color:red;">দুঃখিত, সংযোগে সমস্যা হয়েছে।</p>`;
        }
    }
</script>

</body>
</html>
